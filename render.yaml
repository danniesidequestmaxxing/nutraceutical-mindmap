services:
  - type: web
    name: supply-chain-mindmap
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: MAX_COMPANIES
        value: "60"
      - key: MAX_ANTHROPIC_SPEND_USD
        value: "50"
      - key: DAILY_RUN_CAP
        value: "100"
      - key: PER_IP_RUNS_PER_HOUR
        value: "3"
      - key: DATA_DIR
        value: /var/data
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
